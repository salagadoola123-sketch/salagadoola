<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  body { width:220px; padding:14px; font-family:'Noto Sans KR',sans-serif; background:#111; color:#fff; margin:0; }
  h2 { font-size:15px; margin:0 0 10px; color:#a8ff78; }
  .row { display:flex; justify-content:space-between; align-items:center; margin:6px 0; font-size:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#555; }
  .dot.on { background:#a8ff78; box-shadow:0 0 6px #a8ff78; }
  .val { color:#aaa; }
  .val.ok { color:#a8ff78; }
</style>
</head>
<body>
<h2>🎵 VIBE 가사지</h2>
<div class="row"><span>브릿지 서버</span><div class="dot" id="dot-ws"></div></div>
<div class="row"><span>가사</span><span class="val" id="val-lyrics">-</span></div>
<div class="row"><span>재생위치</span><span class="val" id="val-pos">-</span></div>
<div class="row"><span>webPlayer</span><span class="val" id="val-wp">-</span></div>
<script>
function update() {
  chrome.tabs.query({active:true, currentWindow:true}, tabs => {
    if (!tabs[0]) return;
    chrome.tabs.sendMessage(tabs[0].id, {type:'get_status'}, res => {
      if (chrome.runtime.lastError || !res) return;
      document.getElementById('dot-ws').className = 'dot' + (res.connected ? ' on' : '');
      document.getElementById('val-lyrics').textContent = res.lyrics ? res.lyrics + '줄' : '없음';
      document.getElementById('val-lyrics').className = 'val' + (res.lyrics ? ' ok' : '');
      document.getElementById('val-pos').textContent = res.pos ? res.pos.toFixed(1) + 's' : '-';
      document.getElementById('val-wp').textContent = res.wp_available ? '✅' : '❌';
    });
  });
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
